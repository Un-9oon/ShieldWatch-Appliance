worker_processes 1;

error_log /home/we/.gemini/antigravity/scratch/shieldwatch_uadr/ShieldWatch/gateway/logs/error.log warn;
pid /home/we/.gemini/antigravity/scratch/shieldwatch_uadr/ShieldWatch/gateway/temp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    access_log /home/we/.gemini/antigravity/scratch/shieldwatch_uadr/ShieldWatch/gateway/logs/access.log;

    client_body_temp_path /home/we/.gemini/antigravity/scratch/shieldwatch_uadr/ShieldWatch/gateway/temp/body;
    proxy_temp_path /home/we/.gemini/antigravity/scratch/shieldwatch_uadr/ShieldWatch/gateway/temp/proxy;
    fastcgi_temp_path /home/we/.gemini/antigravity/scratch/shieldwatch_uadr/ShieldWatch/gateway/temp/fastcgi;
    uwsgi_temp_path /home/we/.gemini/antigravity/scratch/shieldwatch_uadr/ShieldWatch/gateway/temp/uwsgi;
    scgi_temp_path /home/we/.gemini/antigravity/scratch/shieldwatch_uadr/ShieldWatch/gateway/temp/scgi;

    # ─── Security: Rate Limiting ──────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=sw_limit:10m rate=15r/s;

    # ─── Upstreams ────────────────────────────────────────────────────────────
    upstream target_app {
        server 127.0.0.1:3001; # The app being protected
    }

    upstream sw_collector {
        server 127.0.0.1:3002; # ShieldWatch Core
    }

    server {
        listen 8080;
        server_name localhost;

        server_tokens off;
        client_max_body_size 10M;

        # ─── Security Headers ─────────────────────────────────────────────────
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline' 'unsafe-eval'; frame-ancestors 'self';" always;

        # ─── Nginx -> ShieldWatch Reporting ───────────────────────────────────
        error_page 403 /api/security/nginx-block?reason=bot;
        error_page 429 /api/security/nginx-block?reason=rate-limit;
        proxy_intercept_errors on;

        # ─── Route: ShieldWatch Management Dashboard ──────────────────────────
        # Accessed via http://localhost:8080/dashboard/
        location /dashboard/ {

            proxy_pass http://sw_collector/; 
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # Fix redirects (e.g. /login -> /dashboard/login)
            proxy_redirect / /dashboard/;
        }

        # Route ShieldWatch API (Dashboard calls /api/auth/login etc.)
        # Since dashboard is at /dashboard/, it will call /dashboard/api/...
        location /dashboard/api/ {

            proxy_pass http://sw_collector/api/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        # Socket.io for ShieldWatch
        location /sw.io/ {

            proxy_pass http://sw_collector/sw.io/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
        }

        # ─── Route: Target App (The protected app) ────────────────────────────
        location / {
            # Bot Blocking
            if ($http_user_agent ~* (sqlmap|nikto|dirbuster|nmap|metasploit)) {
                return 403;
            }

            limit_req zone=sw_limit burst=20 nodelay;

            proxy_pass http://target_app;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            
            # Security: Timeout settings
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # Socket.io for Target App (ZynChat)
        location /socket.io/ {
            proxy_pass http://target_app/socket.io/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
        }

        # Security reporting endpoint on the Target App
        location /api/security/ {
            proxy_intercept_errors off;
            proxy_pass http://target_app;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }
    }
}
